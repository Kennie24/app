<body class="bg-background text-on-surface font-body-md no-scrollbar selection:bg-secondary-fixed-dim">

<h1 class="ml-4 font-headline-lg-mobile text-headline-lg-mobile font-black text-primary">Checkout</h1>
</nav>
<!-- Main Content Canvas -->
<main class="pt-20 pb-40 px-margin-mobile max-w-[390px] mx-auto min-h-screen">

</div>
<div class="flex-grow flex flex-col justify-center">
<span class="font-title-lg text-title-lg text-on-surface leading-tight">Echoes of Summer</span>

</div>

<!-- Payment Methods Selection -->

<h3 class="font-label-lg text-label-lg text-on-surface-variant mb-base uppercase tracking-wider">Payment Method</h3>
<div class="grid grid-cols-1 gap-base">
<!-- MTN - Selected -->
<button class="bg-surface-container-low p-gutter rounded-xl flex items-center gap-sm active-ring transition-all active:scale-95 duration-150 border-2 border-primary">
<div class="w-12 h-12 rounded-lg flex items-center justify-center bg-[#FFCC00]">
<img alt="MTN Logo" class="w-8 h-8 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRKVtUPDtbX_ax5mpDrnCn1ZXci0_XPRQvE6uRoxaykGpT3BX0CdICiewDXFm05qkMSsQyoGOt3O9nM9pWxlM9w2BxSZFM8DCZpBU8f3_8bWtsxHLCPHUO0sMH29HqY9D0uJsYl0ItbDtvyHsxLQPsQQNkcBQ5aujNzjnE4xG8SlpD5Ou6CIOpqraBmP5EFeMYnX1O7nF9HerMNB129hoJ3Iz_XNXXDpW93JJ-xk63jNCYAX7oo051EqhvtM9BKdPlwgqU8lus5Q9P"/>
</div>
<div class="flex-grow text-left">
<span class="font-title-lg text-title-lg block text-on-surface">MTN Mobile Money</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Fast &amp; Secure</span>
</div>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Airtel -->
<button class="bg-surface-container-low p-gutter rounded-xl flex items-center gap-sm border-2 border-outline-variant hover:bg-surface-container-high active:scale-95 duration-150">
<div class="w-12 h-12 rounded-lg flex items-center justify-center bg-[#E11900]">
<img alt="Airtel Logo" class="w-8 h-8 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXoziXQ3CKFrBfqa6eMMal1OPuc0CKnnUtS8ImhllQkIWtOHnpvjeH9CXsqo1RYolwByCmzYkk0TSRCz0a1N8GgKtLfq1e2hnyVs9n8ULLhHB-BgPh0vSWFZqfLnPpXEAqk_1Sv3lhRC0lPqZ9f7huKtm82KQzUUJKa3XiMWRNLI5qXRinAAPf3LT7UcIEGw1e0b4rxW2MKMgI23PG7qipAFl9N9VwwLaCtULaxxezDRq4OLV1Fr0HFIhnu8j0ficw3yK8MMWlylni"/>
</div>
<div class="flex-grow text-left">
<span class="font-title-lg text-title-lg block text-on-surface">Airtel Money</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Instant Payment</span>
</div>
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</button>
<!-- Bank Card -->
<button class="bg-surface-container-low p-gutter rounded-xl flex items-center gap-sm border-2 border-outline-variant hover:bg-surface-container-high active:scale-95 duration-150">

</div>

</button>
<!-- PayPal -->

<div class="w-12 h-12 rounded-lg flex items-center justify-center bg-surface-container-high">
<span class="material-symbols-outlined text-on-surface" style="font-size: 32px;">account_balance_wallet</span>
</div>
<div class="flex-grow text-left">
<span class="font-title-lg text-title-lg block text-on-surface">PayPal</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Fast &amp; Secure</span>
</div>
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</button>
</div>
</section>
<!-- Input Section -->
<section class="mb-lg">
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1" for="momo-number">Mobile Money Number</label>
<div class="relative group">

                </p>

<!-- Security Badge -->
<section class="flex justify-center items-center gap-2 mb-gutter opacity-80">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 18px;">verified_user</span>

</section>

<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 w-full bg-surface-container-lowest p-gutter pt-gutter pb-8 shadow-[0_-4px_20px_rgba(0,0,0,0.4)] z-50 border-t border-outline-variant">
<div class="max-w-[390px] mx-auto flex flex-col gap-gutter">
<div class="flex justify-between items-center px-1">
<span class="font-body-md text-on-surface-variant">Total Amount</span>
<span class="font-headline-md text-headline-md text-primary">$12.00</span>
</div>
<button class="w-full h-14 bg-secondary-container text-on-secondary-container rounded-xl font-title-lg text-title-lg shadow-lg active:scale-95 transition-all duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">lock</span>
                Pay $12.00
            </button>
</div>
</div>
<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                // Haptic feedback simulation if supported
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
                
                // Visual toggle for payment methods
                const isPaymentMethod = this.querySelector('.material-symbols-outlined:last-child')?.innerText.includes('radio_button') || 
                                       this.querySelector('.material-symbols-outlined:last-child')?.innerText.includes('check_circle');
                
                if (isPaymentMethod) {
                    document.querySelectorAll('button').forEach(el => {
                        const icon = el.querySelector('.material-symbols-outlined:last-child');
                        if (icon && (icon.innerText === 'check_circle' || icon.innerText === 'radio_button_unchecked')) {
                            el.classList.remove('active-ring', 'border-primary');
                            el.classList.add('border-outline-variant');
                            icon.innerText = 'radio_button_unchecked';
                            icon.classList.remove('text-primary');
                            icon.classList.add('text-outline');
                            icon.style.fontVariationSettings = "'FILL' 0";
                        }
                    });
                    
                    this.classList.add('active-ring', 'border-primary');
                    this.classList.remove('border-outline-variant');
                    const icon = this.querySelector('.material-symbols-outlined:last-child');
                    if (icon) {
                        icon.innerText = 'check_circle';
                        icon.classList.remove('text-outline');
                        icon.classList.add('text-primary');
                        icon.style.fontVariationSettings = "'FILL' 1";
                    }
                }
            });
        });
    </script>
</body></html>
